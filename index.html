<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Khoảnh Khắc Chung</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* ─── RESET & BASE ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #c0121e;
      --bg2:         #a80f1a;
      --bg3:         #920d17;
      --border:      rgba(255,255,255,.25);
      --gold:        #ffffff;
      --gold-light:  #ffe0e3;
      --text:        #ffffff;
      --muted:       rgba(255,255,255,.65);
      --radius:      12px;
      --shadow:      0 8px 40px rgba(0,0,0,.3);
      --transition:  cubic-bezier(.4,0,.2,1);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── GRAIN TEXTURE OVERLAY ────────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      pointer-events: none;
      z-index: 9999;
      opacity: .5;
    }

    /* ─── SCROLLBAR ─────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.4); border-radius: 2px; }

    /* ─── HEADER ────────────────────────────────────────────────────────── */
    header {
      text-align: center;
      padding: 80px 24px 60px;
      position: relative;
    }

    .header-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 18px;
    }

    .header-line::before,
    .header-line::after {
      content: '';
      flex: 1;
      max-width: 120px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold));
    }
    .header-line::after { background: linear-gradient(90deg, var(--gold), transparent); }

    .header-ornament {
      width: 6px; height: 6px;
      background: var(--gold);
      border-radius: 50%;
      box-shadow: 0 0 14px rgba(255,255,255,.4);
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.8rem, 7vw, 5.5rem);
      font-weight: 300;
      letter-spacing: .04em;
      color: var(--text);
      line-height: 1.1;
    }

    h1 span {
      color: var(--gold);
      font-style: italic;
    }

    .subtitle {
      font-family: 'DM Sans', sans-serif;
      font-size: .85rem;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 16px;
    }

    /* ─── UPLOAD AREA ───────────────────────────────────────────────────── */
    .upload-section {
      max-width: 680px;
      margin: 0 auto 72px;
      padding: 0 24px;
    }

    .drop-zone {
      border: 1.5px dashed var(--border);
      border-radius: 20px;
      padding: 56px 32px;
      text-align: center;
      cursor: pointer;
      position: relative;
      background: var(--bg2);
      transition: border-color .35s var(--transition),
                  background .35s var(--transition),
                  transform .35s var(--transition);
      overflow: hidden;
    }

    .drop-zone::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(255,255,255,.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: var(--gold);
      background: var(--bg3);
      transform: translateY(-2px);
    }

    .drop-zone.drag-over {
      box-shadow: 0 0 0 1px var(--gold), inset 0 0 40px rgba(255,255,255,.07);
    }

    .camera-icon {
      width: 64px; height: 64px;
      margin: 0 auto 20px;
      position: relative;
    }

    .camera-icon svg {
      width: 100%; height: 100%;
      stroke: var(--gold);
      stroke-width: 1.2;
      fill: none;
      transition: transform .4s var(--transition);
    }

    .drop-zone:hover .camera-icon svg { transform: scale(1.1) rotate(-4deg); }

    .drop-zone h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 8px;
    }

    .drop-zone p {
      font-size: .82rem;
      color: var(--muted);
      letter-spacing: .05em;
      margin-bottom: 28px;
      line-height: 1.7;
    }

    .upload-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 13px 36px;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: 'DM Sans', sans-serif;
      font-size: .82rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      border-radius: 100px;
      cursor: pointer;
      transition: background .3s, color .3s, box-shadow .3s;
    }

    .upload-btn:hover {
      background: var(--gold);
      color: #c0121e;
      box-shadow: 0 0 24px rgba(255,255,255,.25);
    }

    #fileInput { display: none; }

    /* Progress bar */
    .progress-wrap {
      margin-top: 24px;
      display: none;
    }
    .progress-wrap.visible { display: block; }

    .progress-label {
      font-size: .78rem;
      color: var(--muted);
      letter-spacing: .1em;
      margin-bottom: 8px;
    }

    .progress-bar {
      height: 2px;
      background: var(--bg3);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      border-radius: 2px;
      width: 0%;
      transition: width .3s var(--transition);
    }

    /* toast */
    .toast {
      position: fixed;
      bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: .82rem;
      letter-spacing: .05em;
      padding: 12px 28px;
      border-radius: 100px;
      box-shadow: var(--shadow);
      transition: transform .4s var(--transition), opacity .4s;
      opacity: 0;
      z-index: 9000;
      white-space: nowrap;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .toast.success { border-color: rgba(201,169,110,.4); color: var(--gold); }
    .toast.error   { border-color: rgba(220,80,80,.4);   color: #dc5050; }

    /* ─── GALLERY HEADER ────────────────────────────────────────────────── */
    .gallery-header {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 32px 32px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .gallery-header h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 300;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .gallery-header .count-badge {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--gold);
      font-size: .72rem;
      letter-spacing: .12em;
      padding: 4px 12px;
      border-radius: 100px;
    }

    .separator {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ─── MASONRY GALLERY ───────────────────────────────────────────────── */
    .gallery {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 24px 100px;
      columns: 4;
      column-gap: 16px;
    }

    @media (max-width: 1200px) { .gallery { columns: 3; } }
    @media (max-width: 768px)  { .gallery { columns: 2; column-gap: 10px; } }
    @media (max-width: 480px)  { .gallery { columns: 1; } }

    .gallery-item {
      break-inside: avoid;
      margin-bottom: 16px;
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      background: var(--bg3);

      /* entrance animation */
      opacity: 0;
      transform: scale(.96) translateY(16px);
      transition: opacity .6s var(--transition),
                  transform .6s var(--transition);
    }

    @media (max-width: 768px) { .gallery-item { margin-bottom: 10px; } }

    .gallery-item.visible {
      opacity: 1;
      transform: scale(1) translateY(0);
    }

    .gallery-item img {
      display: block;
      width: 100%;
      height: auto;
      transition: transform .55s var(--transition), filter .55s;
    }

    .gallery-item:hover img {
      transform: scale(1.05);
      filter: brightness(1.05);
    }

    /* overlay */
    .gallery-item .overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.5) 0%, transparent 50%);
      opacity: 0;
      transition: opacity .4s var(--transition);
      display: flex;
      align-items: flex-end;
      padding: 16px;
    }

    .gallery-item:hover .overlay { opacity: 1; }

    .overlay-icon {
      width: 32px; height: 32px;
      border: 1px solid rgba(255,255,255,.6);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(6px);
      margin-left: auto;
    }

    .overlay-icon svg {
      width: 14px; height: 14px;
      stroke: white; fill: none; stroke-width: 1.8;
    }

    /* skeleton loader */
    .skeleton {
      break-inside: avoid;
      margin-bottom: 16px;
      border-radius: var(--radius);
      background: var(--bg3);
      overflow: hidden;
      position: relative;
    }

    .skeleton::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.04) 50%, transparent 100%);
      animation: shimmer 1.6s infinite;
    }

    @keyframes shimmer {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    /* empty state */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 24px;
      color: var(--muted);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      font-style: italic;
    }

    /* ─── LIGHTBOX ──────────────────────────────────────────────────────── */
    .lightbox {
      position: fixed; inset: 0;
      z-index: 8000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .4s var(--transition);
    }

    .lightbox.open {
      opacity: 1;
      pointer-events: all;
    }

    .lb-backdrop {
      position: absolute; inset: 0;
      background: rgba(5,5,5,.94);
      backdrop-filter: blur(12px);
      cursor: zoom-out;
    }

    .lb-content {
      position: relative;
      z-index: 1;
      max-width: min(90vw, 1200px);
      max-height: 90vh;
      transform: scale(.93);
      transition: transform .4s var(--transition);
    }

    .lightbox.open .lb-content { transform: scale(1); }

    .lb-content img {
      display: block;
      max-width: 100%;
      max-height: 88vh;
      object-fit: contain;
      border-radius: var(--radius);
      box-shadow: 0 32px 100px rgba(0,0,0,.8);
    }

    .lb-close {
      position: absolute;
      top: -48px; right: 0;
      width: 36px; height: 36px;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 50%;
      background: transparent;
      color: white;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .3s, background .3s;
    }

    .lb-close:hover {
      border-color: white;
      background: rgba(255,255,255,.1);
    }

    .lb-close svg { width: 14px; height: 14px; stroke: white; fill: none; stroke-width: 2; }

    .lb-nav {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      width: 44px; height: 44px;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 50%;
      background: rgba(13,13,13,.6);
      backdrop-filter: blur(6px);
      color: white;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .3s, background .3s;
      z-index: 2;
    }

    .lb-nav:hover { border-color: var(--gold); background: rgba(255,255,255,.15); }
    .lb-nav svg { width: 16px; height: 16px; stroke: white; fill: none; stroke-width: 1.8; }
    .lb-prev { left: -60px; }
    .lb-next { right: -60px; }

    @media (max-width: 768px) {
      .lb-prev { left: 8px; }
      .lb-next { right: 8px; }
    }

    /* ─── FOOTER ────────────────────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 40px 24px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: .75rem;
      letter-spacing: .15em;
      text-transform: uppercase;
    }

    footer a { color: var(--gold); text-decoration: none; }

    /* ─── ANIMATIONS ────────────────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    header, .upload-section {
      animation: fadeUp .8s var(--transition) both;
    }

    .upload-section { animation-delay: .15s; }
    .gallery-header { animation: fadeUp .8s .3s var(--transition) both; }
  </style>
</head>
<body>

  <!-- ─── HEADER ──────────────────────────────────────────────────── -->
  <header>
    <div class="header-line">
      <div class="header-ornament"></div>
    </div>
    <h1>Khoảnh <span>Khắc</span> Chung</h1>
    <p class="subtitle">Mọi người cùng chia sẻ kỷ niệm</p>
  </header>

  <!-- ─── UPLOAD ──────────────────────────────────────────────────── -->
  <section class="upload-section">
    <div class="drop-zone" id="dropZone">
      <div class="camera-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </div>
      <h3>Thả ảnh vào đây</h3>
      <p>Hoặc chọn từ thiết bị của bạn<br>JPG · PNG · WEBP · HEIC</p>
      <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Chọn ảnh
      </button>
      <input type="file" id="fileInput" accept="image/*" multiple />
      <div class="progress-wrap" id="progressWrap">
        <p class="progress-label" id="progressLabel">Đang tải lên…</p>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      </div>
    </div>
  </section>

  <!-- ─── GALLERY HEADER ──────────────────────────────────────────── -->
  <div class="gallery-header">
    <h2>Triển Lãm</h2>
    <span class="count-badge" id="countBadge">0 ảnh</span>
    <div class="separator"></div>
  </div>

  <!-- ─── GALLERY ─────────────────────────────────────────────────── -->
  <main class="gallery" id="gallery">
    <!-- items injected by JS -->
  </main>

  <!-- ─── LIGHTBOX ────────────────────────────────────────────────── -->
  <div class="lightbox" id="lightbox">
    <div class="lb-backdrop" id="lbBackdrop"></div>
    <div class="lb-content">
      <button class="lb-close" id="lbClose">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <button class="lb-nav lb-prev" id="lbPrev">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <img id="lbImg" src="" alt="Ảnh triển lãm" />
      <button class="lb-nav lb-next" id="lbNext">
        <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
  </div>

  <!-- ─── TOAST ───────────────────────────────────────────────────── -->
  <div class="toast" id="toast"></div>

  <!-- ─── FOOTER ──────────────────────────────────────────────────── -->
  <footer>
    <p>Khoảnh Khắc Chung &nbsp;·&nbsp; Trung Dũng ❤ Phương Thảo&nbsp;·&nbsp;
    </p>
  </footer>

  <!-- ─── SCRIPT ──────────────────────────────────────────────────── -->
  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getDatabase, ref, push, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

    /* ================================================================
       ⚙️  CẤU HÌNH – THAY ĐỔI CÁC GIÁ TRỊ NÀY
       ================================================================ */
    const CLOUD_NAME    = 'dkhtasbm5';
    const UPLOAD_PRESET = 'xjhichwh';

    // Firebase config – lấy từ Firebase Console → Project Settings
    const FIREBASE_CONFIG = {
      apiKey:            'AIzaSyCd3sGVylwqKblcPJCO-TsFKsI-HcpkjFI',
      authDomain:        'lucky-781b0.firebaseapp.com',
      databaseURL:       'https://lucky-781b0-default-rtdb.firebaseio.com',
      projectId:         'lucky-781b0',
      storageBucket:     'lucky-781b0.firebasestorage.app',
      messagingSenderId: '652015992796',
      appId:             '1:652015992796:web:9a0e0374cf87cc5c035919',
    };
    /* ================================================================ */

    // ── Firebase init
    const app      = initializeApp(FIREBASE_CONFIG);
    const db       = getDatabase(app);
    const imgRef   = ref(db, 'images');

    const CLOUDINARY_URL = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`;
    const FETCH_URL      = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/f_auto,q_auto,w_800/`;

    // ── State
    let images    = [];
    let lbIndex   = 0;
    let uploading = false;

    // ── DOM refs
    const gallery      = document.getElementById('gallery');
    const dropZone     = document.getElementById('dropZone');
    const fileInput    = document.getElementById('fileInput');
    const progressWrap = document.getElementById('progressWrap');
    const progressFill = document.getElementById('progressFill');
    const progressLabel= document.getElementById('progressLabel');
    const countBadge   = document.getElementById('countBadge');
    const lightbox     = document.getElementById('lightbox');
    const lbImg        = document.getElementById('lbImg');
    const lbClose      = document.getElementById('lbClose');
    const lbBackdrop   = document.getElementById('lbBackdrop');
    const lbPrev       = document.getElementById('lbPrev');
    const lbNext       = document.getElementById('lbNext');
    const toastEl      = document.getElementById('toast');

    // ── Toast
    let toastTimer;
    function showToast(msg, type = 'success') {
      clearTimeout(toastTimer);
      toastEl.textContent = msg;
      toastEl.className = `toast ${type} show`;
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 3200);
    }

    // ── Save to Firebase
    async function saveImage(imgData) {
      await push(imgRef, imgData);
    }

    // ── Intersection Observer (scroll reveal)
    const revealObserver = new IntersectionObserver((entries) => {
      entries.forEach((e, i) => {
        if (e.isIntersecting) {
          setTimeout(() => e.target.classList.add('visible'), i * 60);
          revealObserver.unobserve(e.target);
        }
      });
    }, { threshold: 0.05 });

    // ── Render gallery
    function renderGallery() {
      // Update count
      countBadge.textContent = `${images.length} ảnh`;

      if (images.length === 0) {
        gallery.innerHTML = '<p class="empty-state">Chưa có ảnh nào. Hãy là người đầu tiên chia sẻ!</p>';
        return;
      }

      // Build items (newest first)
      const fragment = document.createDocumentFragment();
      [...images].reverse().forEach((img, idx) => {
        const item = document.createElement('div');
        item.className = 'gallery-item';
        item.dataset.index = images.length - 1 - idx;
        item.innerHTML = `
          <img src="${FETCH_URL}${img.publicId}" alt="Ảnh ${idx + 1}" loading="lazy" />
          <div class="overlay">
            <div class="overlay-icon">
              <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </div>
          </div>`;
        item.addEventListener('click', () => openLightbox(parseInt(item.dataset.index)));
        fragment.appendChild(item);
      });

      gallery.innerHTML = '';
      gallery.appendChild(fragment);

      // Observe all items
      gallery.querySelectorAll('.gallery-item').forEach(el => revealObserver.observe(el));
    }

    // ── Upload single file
    async function uploadFile(file, index, total) {
      const formData = new FormData();
      formData.append('file', file);
      formData.append('upload_preset', UPLOAD_PRESET);

      progressLabel.textContent = `Đang tải lên ${index + 1}/${total}…`;

      // XHR for progress
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', CLOUDINARY_URL);

        xhr.upload.onprogress = (e) => {
          if (e.lengthComputable) {
            const base = (index / total) * 100;
            const step = (e.loaded / e.total) * (100 / total);
            progressFill.style.width = `${base + step}%`;
          }
        };

        xhr.onload = () => {
          if (xhr.status === 200) {
            resolve(JSON.parse(xhr.responseText));
          } else {
            reject(new Error(`HTTP ${xhr.status}`));
          }
        };

        xhr.onerror = () => reject(new Error('Network error'));
        xhr.send(formData);
      });
    }

    // ── Handle files
    async function handleFiles(files) {
      if (uploading) return;
      const valid = Array.from(files).filter(f => f.type.startsWith('image/'));
      if (!valid.length) { showToast('Vui lòng chọn file ảnh.', 'error'); return; }

      if (FIREBASE_CONFIG.apiKey === 'YOUR_API_KEY') {
        showToast('⚠ Vui lòng cấu hình Firebase trong code.', 'error');
        return;
      }

      uploading = true;
      progressWrap.classList.add('visible');
      progressFill.style.width = '0%';

      let uploaded = 0;

      for (let i = 0; i < valid.length; i++) {
        try {
          const data = await uploadFile(valid[i], i, valid.length);
          await saveImage({ publicId: data.public_id, url: data.secure_url, ts: Date.now() });
          uploaded++;
        } catch (err) {
          console.error(err);
          showToast(`Lỗi: ${err.message}`, 'error');
        }
      }

      progressFill.style.width = '100%';

      setTimeout(() => {
        progressWrap.classList.remove('visible');
        progressFill.style.width = '0%';
        uploading = false;
        fileInput.value = '';
        if (uploaded > 0) showToast(`✓ Đã tải lên ${uploaded} ảnh thành công!`);
      }, 600);
    }

    // ── Lightbox
    function openLightbox(index) {
      lbIndex = index;
      lbImg.src = images[index].url;
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
      setTimeout(() => { lbImg.src = ''; }, 400);
    }

    function lbNavigate(dir) {
      lbIndex = (lbIndex + dir + images.length) % images.length;
      lbImg.style.opacity = '0';
      setTimeout(() => {
        lbImg.src = images[lbIndex].url;
        lbImg.style.opacity = '1';
      }, 200);
    }

    lbImg.style.transition = 'opacity .2s';
    lbClose.addEventListener('click', closeLightbox);
    lbBackdrop.addEventListener('click', closeLightbox);
    lbPrev.addEventListener('click', (e) => { e.stopPropagation(); lbNavigate(-1); });
    lbNext.addEventListener('click', (e) => { e.stopPropagation(); lbNavigate(1); });

    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') lbNavigate(-1);
      if (e.key === 'ArrowRight') lbNavigate(1);
    });

    // ── Drag & drop
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      handleFiles(e.dataTransfer.files);
    });

    fileInput.addEventListener('change', () => handleFiles(fileInput.files));

    // ── Real-time listener – cập nhật gallery cho tất cả mọi người
    onValue(imgRef, (snapshot) => {
      images = [];
      snapshot.forEach(child => {
        images.push(child.val());
      });
      renderGallery();
    });
  </script>
</body>
</html>
