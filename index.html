<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gửi ảnh cho tôi</title>
<style>
body{
font-family:Arial;
text-align:center;
margin-top:100px;
background:#f5f5f5;
}

.upload{
background:white;
padding:40px;
border-radius:10px;
display:inline-block;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
padding:10px 20px;
font-size:16px;
}
</style>
</head>

<body>

<div class="upload">
<h2>Gửi ảnh</h2>

<input type="file" id="fileInput" accept="image/*">
<br><br>

<button onclick="upload()">Gửi ảnh</button>

<p id="status"></p>
</div>

<script>
async function upload(){

const file = document.getElementById("fileInput").files[0]

if(!file){
alert("Chọn ảnh trước")
return
}

const formData = new FormData()
formData.append("file", file)
formData.append("upload_preset", "unsigned_upload")

const res = await fetch("https://api.cloudinary.com/v1_1/dkhtasbm5/image/upload",{
method:"POST",
body:formData
})

const data = await res.json()

document.getElementById("status").innerText="Upload thành công!"
console.log(data)
}
</script>

</body>
</html>
